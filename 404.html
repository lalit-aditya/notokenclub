<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 ✦ notokenclub — eat your way home</title>
<meta name="robots" content="noindex">
<link rel="icon" href="LOGO.png" type="image/png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&family=Inter:wght@300;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;
  --fg:#f0ede6;
  --accent:#e8ff47;
  --muted:#3a3a3a;
  --muted-text:#8a8a82;
  --blue:#2e4fff;
  --mono:'Geist Mono','Courier New',monospace;
  --display:'Inter','Helvetica Neue',Arial,sans-serif;
}
body{
  background:var(--bg);color:var(--fg);
  font-family:var(--mono);
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:24px;padding:24px;text-align:center;
  -webkit-font-smoothing:antialiased;
}
h1{
  font-family:var(--display);font-weight:900;
  font-size:clamp(64px,16vw,160px);
  letter-spacing:-0.04em;line-height:0.9;
  color:var(--accent);
}
.sub{font-size:13px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted-text)}
.sub .star{color:var(--accent)}
#board{
  border:1px solid var(--muted);
  background:#0d0d0d;
  image-rendering:pixelated;
  touch-action:none;
  max-width:92vw;
}
.hud{
  display:flex;gap:32px;font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted-text);
}
.hud b{color:var(--accent);font-weight:500}
.hint{font-size:10px;letter-spacing:0.12em;color:var(--muted-text);opacity:0.7}
a.home{
  font-size:12px;text-transform:uppercase;letter-spacing:0.12em;
  color:var(--fg);border:1px solid var(--muted);
  padding:14px 28px;text-decoration:none;
  transition:border-color .25s,color .25s;
}
a.home:hover{border-color:var(--accent);color:var(--accent)}
#overlayMsg{
  font-size:12px;letter-spacing:0.16em;text-transform:uppercase;color:var(--accent);
  min-height:16px;
}
@keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
.blink{animation:blink 1s step-end infinite}
</style>
</head>
<body>
  <h1>404</h1>
  <p class="sub">page not found <span class="star">✦</span> eat your way home</p>
  <div class="hud"><span>tokens eaten: <b id="score">0</b></span><span>best: <b id="best">0</b></span></div>
  <canvas id="board" width="420" height="420" aria-label="Snake game"></canvas>
  <p id="overlayMsg" class="blink">press any arrow key / swipe to start</p>
  <p class="hint">arrows or WASD · swipe on touch · walls are gatekeepers, don't hit them</p>
  <a class="home" href="Index.html">← back to notokenclub</a>

<script>
(function () {
  "use strict";
  var canvas = document.getElementById('board');
  var ctx = canvas.getContext('2d');
  var scoreEl = document.getElementById('score');
  var bestEl = document.getElementById('best');
  var msgEl = document.getElementById('overlayMsg');

  var GRID = 21;
  var CELL = canvas.width / GRID;
  var snake, dir, nextDir, food, score, alive, started, timer;
  var best = 0;
  try { best = parseInt(localStorage.getItem('ntc_snake_best') || '0', 10) || 0; } catch (e) {}
  bestEl.textContent = best;

  /* fit canvas on small screens */
  function fit() {
    var size = Math.min(window.innerWidth * 0.92, 420);
    canvas.style.width = size + 'px';
    canvas.style.height = size + 'px';
  }
  window.addEventListener('resize', fit);
  fit();

  function reset() {
    snake = [{ x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 }];
    dir = { x: 1, y: 0 };
    nextDir = dir;
    score = 0;
    alive = true;
    scoreEl.textContent = '0';
    placeFood();
    draw();
  }

  function placeFood() {
    do {
      food = { x: Math.floor(Math.random() * GRID), y: Math.floor(Math.random() * GRID) };
    } while (snake.some(function (s) { return s.x === food.x && s.y === food.y; }));
  }

  /* tiny synth for eat / die */
  var actx = null;
  function beep(freq, durMs, type) {
    try {
      if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
      if (actx.state === 'suspended') actx.resume();
      var t = actx.currentTime;
      var o = actx.createOscillator(), g = actx.createGain();
      o.type = type || 'square';
      o.frequency.value = freq;
      g.gain.setValueAtTime(0.05, t);
      g.gain.exponentialRampToValueAtTime(0.0001, t + durMs / 1000);
      o.connect(g); g.connect(actx.destination);
      o.start(t); o.stop(t + durMs / 1000 + 0.02);
    } catch (e) {}
  }

  function tick() {
    if (!alive) return;
    dir = nextDir;
    var head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    /* wall or self = death */
    if (head.x < 0 || head.x >= GRID || head.y < 0 || head.y >= GRID ||
        snake.some(function (s) { return s.x === head.x && s.y === head.y; })) {
      alive = false;
      started = false;
      clearInterval(timer);
      beep(120, 400, 'sawtooth');
      if (score > best) {
        best = score;
        bestEl.textContent = best;
        try { localStorage.setItem('ntc_snake_best', String(best)); } catch (e) {}
        msgEl.textContent = 'new best ✦ press any key to run it back';
      } else {
        msgEl.textContent = 'gatekept. press any key to run it back';
      }
      msgEl.classList.add('blink');
      draw(true);
      return;
    }

    snake.unshift(head);
    if (head.x === food.x && head.y === food.y) {
      score++;
      scoreEl.textContent = score;
      beep(520 + Math.min(score * 8, 400), 90);
      placeFood();
    } else {
      snake.pop();
    }
    draw();
  }

  function draw(dead) {
    ctx.fillStyle = '#0d0d0d';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    /* food = $TOKEN coin */
    ctx.fillStyle = '#2e4fff';
    ctx.beginPath();
    ctx.arc((food.x + 0.5) * CELL, (food.y + 0.5) * CELL, CELL * 0.36, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = (CELL * 0.5) + 'px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('$', (food.x + 0.5) * CELL, (food.y + 0.52) * CELL);

    /* snake */
    for (var i = 0; i < snake.length; i++) {
      var s = snake[i];
      ctx.fillStyle = dead ? '#5a5a00' : (i === 0 ? '#e8ff47' : 'rgba(232,255,71,' + Math.max(0.25, 1 - i * 0.045) + ')');
      ctx.fillRect(s.x * CELL + 1, s.y * CELL + 1, CELL - 2, CELL - 2);
    }
  }

  function start() {
    if (started) return;
    started = true;
    if (!alive) reset();
    msgEl.textContent = '';
    msgEl.classList.remove('blink');
    clearInterval(timer);
    timer = setInterval(tick, 110);
  }

  function setDir(x, y) {
    /* no 180° turns */
    if (x === -dir.x && y === -dir.y) return;
    nextDir = { x: x, y: y };
    start();
  }

  document.addEventListener('keydown', function (e) {
    var k = e.key;
    if (k === 'ArrowUp' || k === 'w' || k === 'W') { e.preventDefault(); setDir(0, -1); }
    else if (k === 'ArrowDown' || k === 's' || k === 'S') { e.preventDefault(); setDir(0, 1); }
    else if (k === 'ArrowLeft' || k === 'a' || k === 'A') { e.preventDefault(); setDir(-1, 0); }
    else if (k === 'ArrowRight' || k === 'd' || k === 'D') { e.preventDefault(); setDir(1, 0); }
    else if (!alive) { reset(); msgEl.textContent = 'press any arrow key / swipe to start'; }
  });

  /* touch swipe */
  var tx = null, ty = null;
  canvas.addEventListener('touchstart', function (e) {
    tx = e.touches[0].clientX;
    ty = e.touches[0].clientY;
  }, { passive: true });
  canvas.addEventListener('touchend', function (e) {
    if (tx === null) return;
    var dx = e.changedTouches[0].clientX - tx;
    var dy = e.changedTouches[0].clientY - ty;
    if (Math.abs(dx) < 18 && Math.abs(dy) < 18) { tx = ty = null; return; }
    if (!alive) reset();
    if (Math.abs(dx) > Math.abs(dy)) setDir(dx > 0 ? 1 : -1, 0);
    else setDir(0, dy > 0 ? 1 : -1);
    tx = ty = null;
  }, { passive: true });

  reset();
  started = false;
})();
</script>
</body>
</html>
